<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ============================
       🔥 SEO最適化（完全版）
  ============================ -->
  <title>施術内容（鍼灸・整体・美容鍼・トレーニング） | KARiN. ~Sports & Beauty~</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

  <link rel="canonical" href="{{ request.url }}">
  <meta name="description" content="KARiN.では国家資格保有の鍼灸師による鍼灸・整体・美容鍼・トレーニングを組み合わせたオーダーメイド施術をご提供。東京（代々木上原）・福岡（薬院）にて出張専門で対応しています。">
  <meta name="keywords" content="施術内容, 鍼灸, スポーツマッサージ, マッサージ, 整体, 美容鍼, トレーニング, オイルトリートメント, コンディショニング, 出張施術, 代々木上原, 薬院, KARiN">
  <meta name="robots" content="index, follow">
  <meta name="author" content="KARiN. ~Sports & Beauty~">

  <!-- ============================
       🔥 OGP（SNS最適化）
  ============================ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="施術内容（鍼灸・整体・美容鍼・トレーニング） | KARiN.">
  <meta property="og:description" content="鍼灸・整体・美容鍼・トレーニングを組み合わせたオーダーメイド施術。心身をトータルで整えるKARiN.の施術をご紹介します。">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='images/relogo.png', _external=True) }}">
  <meta property="og:site_name" content="KARiN. ~Sports & Beauty~">
  <meta name="twitter:card" content="summary_large_image">

  <!-- ============================
       🔥 構造化データ（Service + LocalBusiness）
  ============================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Service",
        "serviceType": "鍼灸・整体・美容鍼・トレーニング",
        "provider": {
          "@type": "LocalBusiness",
          "name": "KARiN. ~Sports & Beauty~",
          "image": "{{ url_for('static', filename='images/relogo.png', _external=True) }}",
          "telephone": "+81-90-8154-9313",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "福岡市中央区",
            "addressRegion": "福岡県",
            "addressCountry": "JP"
          },
          "areaServed": [
            {
              "@type": "Place",
              "name": "代々木上原",
              "address": {
                "@type": "PostalAddress",
                "addressLocality": "渋谷区",
                "addressRegion": "東京都",
                "addressCountry": "JP"
              }
            },
            {
              "@type": "Place",
              "name": "薬院",
              "address": {
                "@type": "PostalAddress",
                "addressLocality": "福岡市中央区",
                "addressRegion": "福岡県",
                "addressCountry": "JP"
              }
            }
          ],
          "openingHoursSpecification": [{
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
            "opens": "10:00",
            "closes": "19:00"
          }],
          "url": "{{ request.url_root }}"
        },
        "description": "KARiN.では国家資格を持つ鍼灸師が、鍼灸・整体・美容鍼・トレーニングを組み合わせたオーダーメイド施術を行います。"
      },
      {
        "@type": "WebPage",
        "name": "施術内容",
        "url": "{{ request.url }}",
        "about": "鍼灸・整体・美容鍼・オイルトリートメント・トレーニングなどの施術メニュー紹介ページ"
      }
    ]
  }
  </script>

  <!-- ============================
       🔥 CSS & フォント & AOS
  ============================ -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/treatment.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>


<body>

<section class="treatment-wrapper">
  <h1 class="treatment-title" data-aos="fade-up">施術内容</h1>
  <p class="treatment-lead" data-aos="fade-up" data-aos-delay="100">
    KARiN.では、鍼灸・整体・トレーニング・美容など、<br>
    一人ひとりの身体・目的に合わせたオーダーメイドのケアを行っています。
  </p>

  <div class="treatment-grid">
    {% for title, description, image in items %}
    <div class="treatment-card" data-aos="fade-up" data-aos-delay="{{ loop.index * 100 }}">
      <div class="treatment-image">
        <img src="{{ url_for('static', filename='images/' ~ image) }}" alt="{{ title }}">
      </div>
      <h3>{{ title }}</h3>
      <p>{{ description }}</p>
    </div>
    {% endfor %}
  </div>

  <div style="text-align: center; margin-top: 40px; padding-top: 40px; border-top: 1px solid #e0e0e0;">
    <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
      <a href="{{ url_for('yoyogiuehara_shinkyu') }}" style="display: inline-block; padding: 12px 30px; background-color: #1E3A5F; color: #fff; border-radius: 28px; text-decoration: none; font-size: 0.85rem; transition: background-color 0.3s ease;">代々木上原で鍼灸をお探しの方へ</a>
      <a href="{{ url_for('yakuin_shinkyu') }}" style="display: inline-block; padding: 12px 30px; background-color: #1E3A5F; color: #fff; border-radius: 28px; text-decoration: none; font-size: 0.85rem; transition: background-color 0.3s ease;">薬院で鍼灸をお探しの方へ</a>
    </div>
  </div>

</section>

<!-- ✅ AOSスクリプト -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 800,
    once: true
  });
</script>


<!-- ✅ ホームボタン（左下固定） -->
<a href="{{ url_for('index') }}" class="home-btn">
  <img src="{{ url_for('static', filename='images/relogo.png') }}" alt="ホームへ戻る">
  <span>ホームに戻る</span>
</a>

</body>
</html>

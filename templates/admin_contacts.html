{% extends "base.html" %}
{% block content %}

<h2 class="admin-title">📩 未返信お問い合わせ</h2>

{% if items %}
<div class="admin-contact-grid">
  {% for c in items %}
  <a href="/admin/contact/{{ c.id }}" class="admin-contact-card unread">
    <div class="admin-contact-head">
      <strong>{{ c.name }}</strong>
      <span class="admin-contact-date">{{ (c.created_at) | to_jst }}</span>
    </div>

    <p class="admin-contact-body">
      {{ c.message[:30] }}{% if c.message|length > 30 %}...{% endif %}
    </p>
  </a>
  {% endfor %}
</div>
{% else %}
<p>未返信のお問い合わせはありません。</p>
{% endif %}

<a href="/admin/contacts/replied" class="admin-contact-btn admin-contact-btn--spaced">返信済み一覧を見る →</a>

{% endblock %}

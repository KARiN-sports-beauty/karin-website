<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===========================
       🔍 SEO基本設定
  ============================ -->
  <title>{{ news.title }} | KARiN. お知らせ</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
  <link rel="canonical" href="{{ request.url }}">

  <meta name="description" content="{{ news.excerpt }}">
  <meta name="keywords" content="KARiN, お知らせ, 鍼灸, スポーツマッサージ, マッサージ, 整体, 美容鍼, トレーニング, 福岡, 東京, 代々木上原, 薬院">
  <meta name="robots" content="index, follow">
  <meta name="author" content="KARiN. ~Sports & Beauty~">

  <!-- ===========================
       🌐 OGP / SNS（← Supabase 画像URL対応）
  ============================ -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ news.title }}">
  <meta property="og:description" content="{{ news.excerpt }}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ news.image or url_for('static', filename='images/logoname.jpg', _external=True) }}">
  <meta property="og:site_name" content="KARiN. ~Sports & Beauty~">
  <meta name="twitter:card" content="summary_large_image">

  <!-- ===========================
       🧩 JSON-LD（Supabase URL 対応 完全版）
  ============================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": "{{ news.title }}",
    "datePublished": "{{ news.date }}",
    "dateModified": "{{ news.date }}",
    "description": "{{ news.excerpt }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ request.url }}"
    },
    "image": [
      {% if news.image %}
      "{{ news.image }}"
      {% else %}
      "{{ url_for('static', filename='images/logoname.jpg', _external=True) }}"
      {% endif %}
    ],
    "author": {
      "@type": "Organization",
      "name": "KARiN. ~Sports & Beauty~"
    },
    "publisher": {
      "@type": "Organization",
      "name": "KARiN. ~Sports & Beauty~",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ url_for('static', filename='images/logoname.jpg', _external=True) }}"
      }
    }
  }
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/news_style.css') }}">
</head>


<body>

  <section class="news-detail">

    <!-- ===========================
         📝 記事タイトル（唯一のh1）
    ============================ -->
    <h1 class="news-title">{{ news.title }}</h1>

    <p class="news-date">{{ news.date }}</p>

    {% if news.image %}
    <div class="news-thumb">
      <img src="{{ news.image }}" alt="{{ news.title }}">
    </div>
    {% endif %}

    <!-- ===========================
         📝 本文（h1は禁止 → h2,h3に統一）
    ============================ -->
    <div class="news-body">
      {{ news.body|safe }}
    </div>

    <!-- ===========================
         🏠 フッター（ホームへ / お知らせ一覧へ）
    ============================ -->
   <div class="news-detail-buttons">
      <a href="{{ url_for('news_list') }}" class="btn back-list-btn">📚 一覧に戻る</a>
      <a href="{{ url_for('index') }}" class="btn home-return-btn">🏠 ホームに戻る</a>
    </div>

  </section>
</body>
</html>

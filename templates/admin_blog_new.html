{% extends "base.html" %}
{% block title %}新規ブログ作成 | KARiN.{% endblock %}

{% block content %}
<h2 class="admin-title">🆕 新規ブログ作成</h2>

{% if get_flashed_messages() %}
  {% for message in get_flashed_messages(with_categories=true) %}
    <div class="admin-alert admin-alert-{{ message[0] }}" style="margin-bottom: 20px; padding: 12px; border-radius: 8px; background: {% if message[0] == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; color: {% if message[0] == 'success' %}#155724{% else %}#721c24{% endif %};">
      {{ message[1] }}
    </div>
  {% endfor %}
{% endif %}

<form method="POST" action="/admin/blogs/new" enctype="multipart/form-data" style="max-width: 800px;">
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">タイトル <span style="color: #c65a3a;">*</span></label>
    <input type="text" name="title" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="ブログタイトルを入力">
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">URLスラッグ（空欄なら自動生成）</label>
    <input type="text" name="slug" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="url-slug">
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">導入文（meta説明）</label>
    <input type="text" name="excerpt" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="記事の概要を入力">
  </div>

  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">作成スタッフ</label>
    <select name="author_staff_id" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #fff;">
      <option value="">選択してください</option>
      {% for staff in staff_list or [] %}
      <option value="{{ staff.id }}">{{ staff.name }}</option>
      {% endfor %}
    </select>
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">サムネイル画像URL</label>
    <input type="text" name="image" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="https://...（jpg/png/webp 可）">
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">サムネイル画像ファイル（任意）</label>
    <input type="file" name="image_file" accept="image/jpeg,image/png,image/webp" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; background: #fff;">
    <p style="margin: 6px 0 0; font-size: 0.8rem; color: #666;">ファイルを選ぶとURL入力より優先して保存します</p>
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">カテゴリ</label>
    <input type="text" name="category" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="例：健康、美容、トレーニング">
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">タグ（カンマ区切り）</label>
    <input type="text" name="tags" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="タグ1, タグ2, タグ3">
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: flex; align-items: center; gap: 8px; font-weight: 600; color: #1E3A5F;">
      <input type="checkbox" name="draft" style="width: 18px; height: 18px;">
      <span>非公開（下書き）</span>
    </label>
  </div>
  
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #1E3A5F;">本文（Enter で入れた改行は、保存後に公開ページに反映されます）</label>
    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
      <button type="button" id="insert-body-image-btn" class="admin-blog-btn" style="border: none; cursor: pointer; padding: 8px 12px; font-size: 0.9rem;">🖼 本文に画像を追加</button>
      <span id="body-image-status" style="font-size: 0.85rem; color: #666;"></span>
    </div>
    <input type="file" id="body-image-input" accept="image/jpeg,image/png,image/webp" style="display: none;">
    <textarea name="body" id="blog-body-textarea" rows="15" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit;" placeholder="ここに本文を入力してください"></textarea>
  </div>
  
  <div style="display: flex; gap: 12px; margin-top: 30px;">
    <button type="submit" class="admin-blog-btn" style="border: none; cursor: pointer;">💾 保存</button>
    <a href="/admin/blogs" class="admin-blog-btn-white" style="text-decoration: none; display: inline-block; text-align: center;">← 一覧に戻る</a>
  </div>
</form>

<script>
const bodyImageBtn = document.getElementById("insert-body-image-btn");
const bodyImageInput = document.getElementById("body-image-input");
const bodyImageStatus = document.getElementById("body-image-status");
const bodyTextarea = document.getElementById("blog-body-textarea");

bodyImageBtn.addEventListener("click", () => {
  bodyImageInput.click();
});

bodyImageInput.addEventListener("change", async () => {
  const file = bodyImageInput.files[0];
  if (!file) return;

  bodyImageStatus.textContent = "アップロード中...";
  bodyImageBtn.disabled = true;

  try {
    const formData = new FormData();
    formData.append("image", file);
    const res = await fetch("/admin/blogs/body-image", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (!res.ok || !data.url) {
      throw new Error(data.error || "アップロードに失敗しました");
    }

    const insertText = `<img src="${data.url}" alt="挿絵">`;
    const start = bodyTextarea.selectionStart || 0;
    const end = bodyTextarea.selectionEnd || 0;
    const value = bodyTextarea.value || "";
    bodyTextarea.value = value.slice(0, start) + insertText + value.slice(end);
    const cursorPos = start + insertText.length;
    bodyTextarea.setSelectionRange(cursorPos, cursorPos);
    bodyTextarea.focus();
    bodyImageStatus.textContent = "追加しました";
  } catch (e) {
    bodyImageStatus.textContent = e.message;
  } finally {
    bodyImageBtn.disabled = false;
    bodyImageInput.value = "";
    setTimeout(() => {
      bodyImageStatus.textContent = "";
    }, 3000);
  }
});
</script>

{% endblock %}
